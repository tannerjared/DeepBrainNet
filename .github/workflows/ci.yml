name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # -------------------------------------------------------------------------
  # Job 1: syntax checks (no heavy dependencies needed)
  # -------------------------------------------------------------------------
  syntax:
    name: Syntax checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Check Python syntax
        run: |
          python -m py_compile Script/Slicer.py
          python -m py_compile Script/Model_Test.py
          python -m py_compile Script/run_dbn.py
          python -m py_compile Script/tests/test_pipeline.py

      - name: Check shell script syntax
        run: bash -n Script/test.sh

  # -------------------------------------------------------------------------
  # Job 2: unit tests (pure-Python, no TensorFlow / GPU required)
  # -------------------------------------------------------------------------
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: syntax
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run unit tests
        run: python -m unittest discover -s Script/tests -p "test_*.py" -v
